name: Build PyQt6 App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

env:
  APP_NAME: MoonrakerHostScanner
  MAIN_SCRIPT: main.py
  ICON_WIN: icon.ico
  ICON_MAC: icon.icns

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller Pillow -r requirements.txt

    - name: Build Windows executable
      run: |
        pyinstaller $env:MAIN_SCRIPT `
          --noconfirm `
          --onefile `
          --windowed `
          --name $env:APP_NAME `
          --icon $env:ICON_WIN

    - name: Create ZIP
      run: |
        Compress-Archive -Path dist\$env:APP_NAME.exe -DestinationPath $env:APP_NAME-windows.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-windows
        path: ${{ env.APP_NAME }}-windows.zip

  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip3 install pyinstaller Pillow create-dmg -r requirements.txt

    - name: Build macOS .app
      run: |
        pyinstaller $MAIN_SCRIPT \
          --noconfirm \
          --windowed \
          --name "$APP_NAME" \
          --icon "$ICON_MAC"

    - name: Create DMG
      run: |
        create-dmg "dist/$APP_NAME.app" \
          --overwrite \
          --dmg-title "$APP_NAME" \
          --app-drop-link 600 185 \
          "dist/"

    - name: Zip .app
      run: |
        ditto -c -k --sequesterRsrc --keepParent "dist/$APP_NAME.app" "$APP_NAME-macos.zip"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-macos
        path: |
          dist/*.dmg
          ${{ env.APP_NAME }}-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-windows
        path: artifacts/

    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-macos
        path: artifacts/

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload assets to release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/*.zip
          artifacts/*.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
