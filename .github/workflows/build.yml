name: Moonraker Host Scanner

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

env:
  APP_NAME: MoonrakerHostScanner
  MAIN_SCRIPT: main.py
  ICON_WIN: icon.ico
  ICON_MAC: icon.icns

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build Windows executable
        run: |
          pyinstaller $env:MAIN_SCRIPT --onefile --name $env:APP_NAME --icon $env:ICON_WIN

      - name: Zip Windows binary
        run: Compress-Archive -Path dist\$env:APP_NAME.exe -DestinationPath dist\$env:APP_NAME-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows
          path: dist/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build macOS .app
        run: |
          pyinstaller $MAIN_SCRIPT --windowed --name $APP_NAME --icon $ICON_MAC

      - name: Create .dmg
        run: |
          create-dmg \
            --volname "$APP_NAME" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "dist/$APP_NAME.dmg" \
            "dist/$APP_NAME.app"

      - name: Zip .app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "dist/$APP_NAME.app" "dist/$APP_NAME-macos.zip"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos
          path: |
            dist/*.dmg
            dist/*.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.zip
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
